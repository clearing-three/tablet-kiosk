<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kiosk Display</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="main-container">
    <div id="main-left">
      <div id="sun-times">
        <div class="sun-time">
          <img src="weather-icons/sunrise.svg" alt="Sunrise" class="sun-icon">
          <span id="sunrise-time">--:--</span>
        </div>
        <div class="sun-time">
          <img src="weather-icons/sunset.svg" alt="Sunset" class="sun-icon">
          <span id="sunset-time">--:--</span>
        </div>
      </div>
      <div id="moon-phase">
        <div id="moon-emoji">🌑</div>
        <div id="moon-phase-name">Loading moon phase...</div>
      </div>
    </div>

    <div id="main-right">
      <div id="time">--:--</div>
      <div id="date">Loading date...</div>
      <div id="weather">
        <object id="weather-icon" type="image/svg+xml" data=""></object>
        <div id="temp-now">--°</div>
        <div id="weather-desc">Loading...</div>
        <div id="weather-range"></div>
      </div>
      <div id="forecast"></div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
