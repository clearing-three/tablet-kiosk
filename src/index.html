<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiosk Display</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main-container">
      <div id="main-left">
        <div id="moon-phase">
          <div id="moon-phase-render">
            <img id="moon" alt="Current moon phase" />
          </div>
        </div>
      </div>

      <div id="main-right">
        <section class="section-time">
          <div id="time">--:--</div>
        </section>

        <section class="section-date-sun">
          <div id="date">Loading date...</div>
          <div id="sun-times">
            <img src="weather-icons/clear-day.svg" alt="Sun" class="sun-icon" />
            <span id="sunrise-time"></span>
            <span id="sunset-time"></span>
          </div>
        </section>

        <section class="section-weather">
          <div id="temp-row">
            <div id="temp-now" class="temperature">--</div>
            <div id="feels-like-display">
              <span id="feels-like" class="temperature"></span>
            </div>
          </div>
          <div id="wind-display">
            <img src="weather-icons/wind.svg" alt="Wind" class="wind-icon" />
            <span id="wind-direction"></span>
            <div id="wind-speed"></div>
          </div>
          <div id="weather-range"></div>
        </section>

        <section class="section-forecast">
          <div id="forecast">
            <div id="forecast-day-1" class="forecast-day">
              <div class="forecast-day-name"></div>
              <object type="image/svg+xml" class="forecast-icon"></object>
              <div class="forecast-desc"></div>
              <div class="forecast-range"></div>
            </div>
            <div id="forecast-day-2" class="forecast-day">
              <div class="forecast-day-name"></div>
              <object type="image/svg+xml" class="forecast-icon"></object>
              <div class="forecast-desc"></div>
              <div class="forecast-range"></div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
