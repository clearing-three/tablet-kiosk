<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiosk Display</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main-container">
      <div id="main-left">
        <div id="astro-times">
          <div class="time-row">
            <div class="astro-time sun-time">
              <img
                src="weather-icons/sunrise.svg"
                alt="Sunrise"
                class="astro-icon"
              />
              <span id="sunrise-time">--:--</span>
            </div>
            <div class="astro-time sun-time">
              <img
                src="weather-icons/sunset.svg"
                alt="Sunset"
                class="astro-icon"
              />
              <span id="sunset-time">--:--</span>
            </div>
          </div>
          <div class="time-row">
            <div class="astro-time moon-time">
              <img
                src="weather-icons/moonrise.svg"
                alt="Moonrise"
                class="astro-icon"
              />
              <span id="moonrise-time">--:--</span>
            </div>
            <div class="astro-time moon-time">
              <img
                src="weather-icons/moonset.svg"
                alt="Moonset"
                class="astro-icon"
              />
              <span id="moonset-time">--:--</span>
            </div>
          </div>
        </div>
        <div id="moon-phase">
          <div id="moon-phase-render">
            <svg id="moon"></svg>
          </div>
          <div id="moon-phase-name">Loading moon phase...</div>
        </div>
      </div>

      <div id="main-right">
        <div id="time">--:--</div>
        <div id="date">Loading date...</div>
        <div id="weather">
          <object id="weather-icon" type="image/svg+xml" data=""></object>
          <div id="temp-now">--°</div>
          <div id="weather-desc">Loading...</div>
          <div id="weather-range"></div>
        </div>
        <div id="forecast"></div>
      </div>
    </div>

    <script src="moon-phase.js"></script>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
