name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [format:check, lint, stylelint, analyze:lit]
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - name: Cache ESLint
        if: matrix.task == 'lint'
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ hashFiles('**/*.ts', '**/*.js') }}

      - run: npm run ${{ matrix.task }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - run: npm run build
