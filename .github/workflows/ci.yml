name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.2.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: |
          npm run format:check
          npm run lint
          npm test
          npm run build
