name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [format:check, lint, stylelint, analyze:lit]
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache ESLint
        if: matrix.task == 'lint'
        uses: actions/cache@v5
        with:
          path: .eslintcache
          key: eslint-${{ hashFiles('**/*.ts', '**/*.js') }}

      - run: pnpm ${{ matrix.task }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

  all-checks:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    steps:
      - run: true
